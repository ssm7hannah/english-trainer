<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>English Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <div class="header">

        <h1>📘 English Trainer</h1>

        <div class="header-actions">

            <a
                href="https://docs.google.com/spreadsheets/d/1gD6OEDDVH1gBIBO1iNS4_tXVJhlTdGZX5Gk8lpyHces/edit"
                target="_blank"
                class="icon-btn"
                title="Add Sentence"
            >
                ➕
            </a>

            <button
                class="icon-btn"
                onclick="resetLearningData()"
                title="Reset Data"
            >
                🗑️
            </button>


            <button
                class="icon-btn"
                onclick="setTab('import')"
                title="OCR Import"
            >
                ⚙️
            </button>

        </div>

    </div>

    <!-- TAB -->
    <div class="tab">
        <button onclick="setTab('learn')">학습</button>
        <button onclick="setTab('list')">전체문장</button>
        <button onclick="setTab('stats')">통계</button>
    </div>

    <!-- =========================
         LEARN VIEW (완전 복구)
    ========================= -->
    <div id="learnView">

        <div style="margin-bottom:10px;">
            <select id="sourceFilter" onchange="Controller.next()">
                <option value="ALL">전체</option>
            </select>
        </div>

        <div class="card">

        <!-- LEVEL BADGE -->
        <div id="levelBadge" onclick="showLevelDetail()"></div>

        <!-- META -->
        <div class="meta-row">
            <span id="sentenceId"></span>
            <span id="tag"></span>
            <span id="source"></span>
        </div>

        <!-- MAIN SENTENCE -->
        <div id="koreanSentence"></div>

        <div class="divider"></div>

        <!-- ENGLISH -->
        <div id="englishSentence"></div>

        <div id="noteBox" class="hidden">
            <span id="noteText"></span>
        </div>

        <button class="answer-btn" onclick="showAnswer()">
            Show Answer
        </button>

        <!-- ACTION -->
        <div class="btn-group">
            <button class="wrong" onclick="submitAnswer(false)">Wrong</button>
            <button class="correct" onclick="submitAnswer(true)">Correct</button>
        </div>

    </div>

    </div>

    <!-- =========================
         LIST VIEW (완전 복구)
    ========================= -->
    <div id="listView" class="hidden">

        <div style="
            display:flex;
            gap:8px;
            margin-bottom:10px;
        ">

            <select
                id="listSourceFilter"
                onchange="renderList()"
            >
                <option value="ALL">전체</option>
            </select>

            <input
                id="searchBox"
                type="text"
                placeholder="검색..."
                oninput="renderList()"
                style="
                    flex:1;
                    padding:8px;
                    border:1px solid #ddd;
                    border-radius:8px;
                "
            />

        </div>

        <div id="sentenceList" class="card"></div>

    </div>

    <!-- =========================
         STATS VIEW (캘린더 포함)
    ========================= -->
    <div id="statsView" class="hidden">

        <div class="section-title">📊 Overview</div>
        <div id="summary" class="card"></div>

        <div class="section-title">🏆 Mastery</div>
        <div id="masterProgress" class="card"></div>

        <div class="section-title">📈 Levels</div>
        <div id="levelStats" class="card"></div>



        <div class="section-title">📅 Calendar</div>
        <div class="stats-section">
            <div class="weekday">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>

            <div id="calendar"></div>
        </div>

        <div class="stats-section">
            <div id="dayDetail" class="card hidden"></div>
        </div>

    </div>

    <!-- OCR IMPORT -->
    <div id="importView" class="hidden">

        <div class="card">

            <h3>📚 OCR Import</h3>

            <textarea
                id="ocrInput"
                placeholder="OCR 텍스트 붙여넣기"
                style="
                    width:100%;
                    height:250px;
                    padding:10px;
                    box-sizing:border-box;
                "
            ></textarea>

            <div style="margin-top:10px; display:flex; gap:8px;">

                <button onclick="convertOcrText()">
                    Convert
                </button>

                <button onclick="copyTsv()">
                    Copy TSV
                </button>

            </div>

            <textarea
                id="ocrOutput"
                readonly
                style="
                    width:100%;
                    height:250px;
                    margin-top:10px;
                    padding:10px;
                    box-sizing:border-box;
                "
            ></textarea>

        </div>

    </div>


</div>




<script src="app.js"></script>
<div id="levelModal" class="modal hidden"></div>
</body>
</html>
